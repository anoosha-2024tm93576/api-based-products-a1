openapi: 3.1.1
info:
  title: Record Label API
  description: API for managing artists in a record label Database
  version: 1.0.0

servers:
  - url: https://localhost:5000
    description: Local Development Server

security:
  - basicAuth: []

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: Basic authentication for API access using username and password

schemas:
  Artist:
    type: object
    properties:
      username:
        type: string
        description: Unique username of the artist
        example: red_velvet
      name:
        type: string
        description: Full name of the artist
        example: Red Velvet
      genre:
        type: string
        description: Genre of the artist
        exmaple: K-Pop
      albums_published:
        type: integer
        description: Number of albums published by the artist
        example: 4
    required:
      - username
      - name
      - genre
      - albums_published

  ArtistInput:
    type: object
    properties:
      username:
        type: string
        description: Unique username of the artist
        example: red_velvet
      name:
        type: string
        description: Full name of the artist
        example: Red Velvet
      genre:
        type: string
        description: Genre of the artist
        exmaple: K-Pop
      albums_published:
        type: integer
        description: Number of albums published by the artist
        example: 4
    required:
      - username
      - name
      - genre
      - albums_published

  Error:
    type: object
    properties:
      error:
        type: string
        description: Error message
        example: "Artist not found"
      code:
        type: integer
        description: HTTP status code for the error
        example: 404
    required:
      - error
      - code

paths:
  /artists:
    get:
      summary: Get all artists
      description: Returns a list of all artists in the database
      security:
        - basicAuth: []
      parameters:
        - name: offset
          in: query
          description: Page number to retrieve 
          required: false
          schema:
            type: integer
            default: 0
            example: 0
        - name: limit
          in: query
          description: Number of artists to retrieve per page
          required: false
          schema:
            type: integer
            default: 10
            example: 10
      responses:
        200:
          description: A list of artists
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                    example: 25
                  offset:
                    type: integer
                    example: 0
                  limit:
                    type: integer
                    example: 10
                  artists:
                    type: array
                    items:
                      $ref: '#/components/schemas/Artist'
        400:
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        401:
          description: Unauthorized - Invalid or missing credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: Create a new artist
      description: Creates a new artist in the database
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArtistInput'
      responses:
        201:
          description: Artist successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Artist'
        400:
          description: Bad request - Missing or invalid fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        401:
          description: Unauthorized - Invalid or missing credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        500:
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /artists/{artistname}:
    get:
      summary: Get a specific artist
      description: Returns information about a specific artist by their name
      security:
        - basicAuth: []
      parameters:
        - name: artistname
          in: path
          description: The username of the artist to retrieve
          required: true
          schema:
            type: string
            example: red_velvet
      responses:
        200:
          description: Successfully retrieved artist information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Artist'
        401:
          description: Unauthorized - Invalid or missing credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        404:
          description: Artist not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        500:
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'