_format_version: "3.0"

services:
  - name: book-service
    url: http://host.docker.internal:5000
    routes:
      - name: book-route
        paths:
          - /api
        strip_path: false

plugins:
  - name: rate-limiting
    config:
      minute: 5
      policy: local

  - name: request-size-limiting
    config:
      allowed_payload_size: 1